  :root{
    --bg:#000; --panel:#131316; --ink:#f4f4f5; --dim:#8a8a92; --line:#2b2b31;
    --active:#1c3b12; --activeLine:#3f7d28; --activeInk:#cfe8bf;
    --warn:#ffd23f; --danger:#ff4141; --paused:#17c8ad; --accent:#2f90d1;
    --clockfont:ui-monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:var(--bg);color:var(--ink);overflow:hidden;
    display:flex;align-items:flex-start;justify-content:center;padding-top:10px;
    font-family:"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  .mono{font-variant-numeric:tabular-nums;font-feature-settings:"tnum";
    font-family:ui-monospace,"Cascadia Code","SF Mono",Menlo,Consolas,monospace}

  /* Fixed 16:9 stage that scales as one unit; everything sized in cq units
     so it looks identical whether the window is large or a tiny Zoom tile. */
  /* Fixed box: ~old timer width, a little taller for the name text under the
     clocks. Caps at 540px, shrinks (keeping shape) only if the window is smaller. */
  /* Fixed size, centered on black — like the old app's default 500px container.
     Change the two numbers to resize; 16:9 ratio kept. */
  #stage{
    position:relative;
    width:560px;
    height:265px;
    container-type:size;
    display:grid;
    grid-template-rows:auto 1fr auto;    /* top controls / timers / bottom controls */
    background:var(--bg);
  }
  body.scaled{padding-top:0}
  body.scaled #stage{width:100vw;height:100vh}

  /* gear / config menu */
  #gear{margin-left:auto;z-index:6;
    background:transparent;border:none;color:var(--dim);font-size:4.6cqh;cursor:pointer;
    line-height:1;padding:.5cqh}
  #gear:hover{color:var(--ink)}

  /* ---- CLOCKS (one fused block) ---- */
  #clocks{flex:1;display:grid;grid-template-columns:1fr 1fr;min-height:0;
    border:.5cqh solid var(--line);border-radius:2cqh;overflow:hidden;background:var(--panel)}
  .panel{position:relative;display:flex;flex-direction:column;align-items:center;
    justify-content:flex-start;transition:background .2s}
  .panel.day{border-right:.5cqh solid var(--line)}
  .panel.on{background:var(--active)}
  .panel .lab{font-size:5.5cqh;font-weight:700;letter-spacing:.18em;color:var(--dim);margin-top:3cqh}
  .panel.on .lab{color:var(--activeInk)}
  .panel .clk{flex:1;display:flex;align-items:center;justify-content:center;
    font-family:var(--clockfont),ui-monospace,monospace;font-size:min(26cqh,11cqw);line-height:.85;font-weight:700}
  .clk.warn{color:var(--warn)} .clk.danger,.clk.negative{color:var(--danger)}
  body.paused .panel.on{background:#0c1c1a}
  body.paused .clk{color:var(--paused)!important}

  /* vote bar lives in the side panel, replaces the clock in vote mode */
  #voteWrap{display:none;flex:1;flex-direction:column;align-items:center;justify-content:center;gap:2.5cqh;width:82%}
  #voteWrap .bar{width:100%;height:7cqh;background:#3a1010;border-radius:1.4cqh;overflow:hidden}
  #voteWrap .fill{height:100%;width:0;background:var(--danger);transition:.08s linear}
  #voteCount{font-size:12cqh;font-weight:700;color:var(--ink)}
  #voteMini{position:absolute;bottom:1cqh;right:1.5cqw;font-size:4.5cqh;font-weight:700;color:var(--danger);opacity:.16;display:none;z-index:2}
  #side.mode-vote .clk{display:none}
  #side.mode-vote #voteWrap{display:flex}

  /* ---- FORMAL LABEL ---- */
  #label{display:flex;align-items:center;justify-content:center;min-height:8cqh;
    font-size:4.6cqh;font-weight:700;padding:0 2cqw;white-space:nowrap;overflow:hidden}
  #label #lblCtx{color:var(--dim)}
  #label .type{color:var(--accent)}

  /* ---- CONTROLS (subtle, compact) ---- */
  #top{display:flex;align-items:center;gap:1.6cqw;padding:1.8cqh 2cqw}
  #mid{display:flex;flex-direction:column;min-height:0;gap:1cqh;padding:.4cqh 1.6cqw}
  #bottom{display:flex;align-items:stretch;gap:2.5cqw;
    padding:1.4cqh 2cqw 1.9cqh;border-top:1px solid var(--line)}
  .bcol{flex:1;display:flex;flex-direction:column;gap:1.1cqh}
  .brow{display:flex;gap:1cqw}
  .brow>*{flex:1 1 0;min-width:0}
  .bcol>.ctl{width:100%}
  .cg{display:flex;align-items:center;gap:.8cqw}
  .cg .cl{font-size:3.2cqh;letter-spacing:.1em;color:var(--dim);text-transform:uppercase}
  .f3lbl{display:flex;align-items:center;gap:.5cqw;font-size:3.2cqh;color:var(--dim);cursor:pointer;text-transform:uppercase}
  .f3lbl input[type=checkbox]{width:auto;padding:0;background:transparent;border:0;accent-color:var(--accent);cursor:pointer}
  button.ctl,select,input{font:inherit;font-size:3.6cqh;color:var(--ink);
    background:#1c1c22;border:1px solid var(--line);border-radius:1.2cqh;
    padding:1.2cqh 1.6cqw;cursor:pointer;transition:.12s;white-space:nowrap}
  button.ctl:hover{background:#26262e;border-color:#3a3a44}
  button.ctl:active{transform:translateY(1px)}
  button.ctl.on{background:#2a2320;border-color:#5a4a3a;color:#ffd9b0} /* running = stop */
  .ctl:disabled,#controls select:disabled,#controls input:disabled{opacity:.35;cursor:not-allowed}
  input{cursor:text}
  input.num{width:12cqw;text-align:center} input.name{width:24cqw}
  input.dur{width:14cqw;text-align:center}

  /* settings modal */
  #settings{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;
    align-items:center;justify-content:center;z-index:20}
  #settings.show{display:flex}
  #settings .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;
    padding:16px 20px;width:540px;max-width:94vw;text-align:left}
  #settings h2{font-size:18px;margin-bottom:12px}
  #settings .tabs{display:flex;gap:6px;margin-bottom:14px;border-bottom:1px solid var(--line)}
  #settings .tab{background:none;border:none;border-radius:0;color:var(--dim);padding:6px 14px;cursor:pointer;font-size:14px;border-bottom:2px solid transparent}
  #settings .tab.active{color:var(--ink);border-bottom-color:var(--accent)}
  #settings .tabpane[hidden]{display:none}
  #settings .fields{display:grid;grid-template-columns:1fr 1fr;gap:10px 22px}
  #settings .field{display:flex;flex-direction:column;align-items:stretch;gap:4px}
  #settings .field label{color:var(--dim);font-size:12.5px}
  #settings input,#settings select,#settings button{font:inherit;font-size:13px;color:var(--ink);
    background:#1b1b21;border:1px solid var(--line);border-radius:7px;padding:6px 9px;cursor:pointer}
  #settings input,#settings select{width:100%}
  #settings input{text-align:center}
  #settings .actions{display:flex;justify-content:flex-end;gap:10px;margin-top:14px}
  #settings .actions button{background:#22222a;padding:8px 18px;width:auto}
  #settings .actions #setSave{background:var(--ok);border-color:#3a9a28}
</style>
</head>
<body>
<div id="stage">
  <!-- TOP: start/stop + settings -->
  <div id="top">
    <div class="cg">
      <span class="cl">Day</span>
      <input class="num" id="dayMin" type="number" min="1" value="18">
      <button class="ctl" id="dayToggle">Start</button>
    </div>
    <button class="ctl" id="gtdBtn">GTD</button>
    <div class="cg">
      <span class="cl">Day&nbsp;#</span>
      <input class="num" id="dayNum" type="number" min="1" value="1">
      <label class="f3lbl"><input type="checkbox" id="f3toggle"> F3</label>
    </div>
    <div class="cg">
      <span class="cl">Formal</span>
      <select id="fLen"><option value="3:00">3 min</option><option value="4:00" selected>4 min</option></select>
    </div>
    <button id="gear" title="Settings">&#9881;</button>
  </div>

  <!-- MIDDLE: clocks + label -->
  <div id="mid">
    <div id="clocks">
      <div class="panel day" id="dayPanel">
        <div class="lab">DAY</div>
        <div class="clk mono" id="dayClk">30:00</div>
      </div>
      <div class="panel side" id="side">
        <div class="lab" id="sideLab">FORMAL</div>
        <div class="clk mono" id="sideClk">00:00</div>
        <div id="voteWrap"><div class="bar"><div class="fill" id="voteFill"></div></div><div id="voteCount" class="mono">0.000</div></div>
        <div id="voteMini" class="mono"></div>
      </div>
    </div>
    <div id="label"><span id="lblCtx"></span><span id="lblFormal"></span></div>
  </div>

  <!-- BOTTOM: two columns -->
  <div id="bottom">
    <div class="bcol left">
      <div class="brow">
        <select id="fType"><option>Formal</option><option>EOD</option><option>GTD</option><option>RNG 1</option><option>RNG 2</option></select>
        <input class="name" id="fName" placeholder="on (name)">
      </div>
      <button class="ctl" id="fToggle">Start Formal</button>
    </div>
    <div class="bcol right">
      <button class="ctl" id="pauseBtn">Pause</button>
      <div class="brow">
        <button class="ctl" id="tenBtn">10 sec</button>
        <button class="ctl" id="voteBtn">Vote</button>
      </div>
    </div>
  </div>

</div>

<!-- settings modal: OUTSIDE #stage (container-type would trap a fixed modal) -->
<div id="settings">
  <div class="card">
    <h2>Settings</h2>
    <div class="tabs">
      <button class="tab active" data-tab="timers">Timers</button>
      <button class="tab" data-tab="visual">Visual</button>
    </div>
    <div class="tabpane" id="tab-timers">
      <div class="fields">
      <div class="field"><label>Default day length (min)</label><input id="setDay" type="number" min="1"></div>
      <div class="field"><label>GTD length (min)</label><input id="setGtd" type="number" min="1"></div>
      <div class="field"><label>Day warn (sec left)</label><input id="setDayWarn" type="number"></div>
      <div class="field"><label>Day danger (sec left)</label><input id="setDayDanger" type="number"></div>
      <div class="field"><label>Vote window (sec)</label><input id="setVote" type="number" min="1"></div>
      <div class="field"><label>Formal direction</label><select id="setDir"><option value="up">Count up</option><option value="down">Count down</option></select></div>
      <div class="field"><label>Formal warn (sec left)</label><input id="setWarn" type="number"></div>
      <div class="field"><label>Formal danger (sec left)</label><input id="setDanger" type="number"></div>
      <div class="field"><label>F3 sets formal to 3 min</label><select id="setF3min"><option value="on">On</option><option value="off">Off</option></select></div>
      </div>
    </div>
    <div class="tabpane" id="tab-visual" hidden>
      <div class="fields">
      <div class="field"><label>Clock font</label><select id="setFont"><option value="digital7">Digital-7 (old app)</option><option value="dsegModern">DSEG7 Modern</option><option value="dsegClassic">DSEG7 Classic</option><option value="mono">Plain mono</option></select></div>
      <div class="field"><label>Layout</label><select id="setSize"><option value="fixed">Fixed size</option><option value="fill">Fill window (scalable)</option></select></div>
      </div>
    </div>
    <div class="actions"><button class="ctl" id="setCancel">Close</button><button class="ctl" id="setSave">Save</button></div>
  </div>
</div>

<script>
"use strict";
const $ = id => document.getElementById(id);

const DEF = {dayMin:18, formal:"4:00", vote:3, warn:60, danger:20, formalDir:"up", font:"mono", dayWarn:120, dayDanger:30, size:"fixed", f3min:true, gtdMin:2};
let cfg = Object.assign({}, DEF, JSON.parse(localStorage.getItem("mt_cfg")||"{}"));
const saveCfg = () => localStorage.setItem("mt_cfg", JSON.stringify(cfg));
const FONTS = {digital7:"'Digital7'", dsegModern:"'DSEG7Modern'", dsegClassic:"'DSEG7Classic'", mono:"ui-monospace"};
const applyFont = () => document.documentElement.style.setProperty('--clockfont', FONTS[cfg.font]||FONTS.digital7);
const applyScale = () => document.body.classList.toggle('scaled', cfg.size==='fill');

const parseDur = str => {
  str = String(str).trim();
  if(str.includes(":")){ const [m,s]=str.split(":"); return (+m||0)*60+(+s||0); }
  return Math.round((+str||0)*60);
};
const fmt = sec => {
  const neg = sec<0 ? "-" : ""; sec = Math.abs(Math.round(sec));
  return neg + String(Math.floor(sec/60)).padStart(2,"0") + ":" + String(sec%60).padStart(2,"0");
};
const now = () => Date.now();

let paused=false, gtdActive=false;
const day    = {endAt:0, remain:0, running:false};
const formal = {startAt:0, pausedElapsed:0, total:0, running:false}; // counts UP
const ten    = {endAt:0, remain:0, running:false, done:false};
const vote   = {startAt:0, pausedElapsed:0, active:false, ended:false}; // counts UP, never stops

/* ---- DAY ---- */
function toggleDay(){ day.running ? stopDay() : startDay(); }
function startDay(){
  const total=(parseInt($("dayMin").value,10)||0)*60; if(total<=0) return;
  day.endAt=now()+total*1000; day.running=true; gtdActive=false;
  $("dayPanel").classList.add("on"); dayCtl(); setActionsEnabled(); updateLabel();
}
function stopDay(){
  day.running=false; $("dayPanel").classList.remove("on");
  $("dayClk").className="clk mono"; $("dayClk").textContent="00:00"; dayCtl();
  formal.running=false; ten.running=false; ten.done=false; vote.active=false; vote.ended=false; gtdActive=false;
  formalCtl(); $("voteBtn").textContent="Vote"; updateLabel(); setActionsEnabled();
}
function dayCtl(){
  const on=day.running;
  $("dayMin").style.display=on?"none":""; $("dayMin").previousElementSibling.style.opacity=on?.4:1;
  $("dayToggle").textContent=on?"Stop":"Start"; $("dayToggle").classList.toggle("on",on);
}
function startGTD(){ $("dayMin").value=cfg.gtdMin; startDay(); $("dayMin").value=cfg.dayMin; gtdActive=true; updateLabel(); } // 2-min GTD day
function setActionsEnabled(){ // formal/actions only usable while a day is actively running
  const on = day.running && !paused;
  ["fType","fName","fToggle","tenBtn","voteBtn"].forEach(id=>$(id).disabled=!on);
}

/* ---- FORMAL ---- */
function toggleFormal(){ formal.running ? stopFormal() : startFormal(); }
function startFormal(){
  ten.running=false; ten.done=false; vote.active=false; vote.ended=false; gtdActive=false; $("voteBtn").textContent="Vote";
  formal.total=parseDur(cfg.formal);
  formal.startAt=now(); formal.running=true;
  formalCtl(); updateLabel();
}
function stopFormal(){
  formal.running=false; $("sideClk").className="clk mono"; $("sideClk").textContent="00:00";
  formalCtl(); updateLabel();
}
function formalCtl(){
  const on=formal.running;
  $("fToggle").textContent=on?"Stop Formal":"Start Formal"; $("fToggle").classList.toggle("on",on);
}
function esc(s){return String(s).replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'})[c]);}
function updateLabel(){
  const min = Math.round(parseDur(cfg.formal)/60);
  const prefix = $("f3toggle").checked ? "F3" : "D"+($("dayNum").value||1);
  $("lblCtx").textContent = `${prefix} --- ${min} min formals`;
  const t=$("fType").value;
  if(formal.running){
    const n=$("fName").value.trim();
    const typeLabel = t==="Formal"?"Formal":t+" Formal";
    $("lblFormal").innerHTML = ` : <span class="type">${esc(typeLabel)}</span>${n?" on "+esc(n):""}`;
  } else if(gtdActive){
    $("lblFormal").innerHTML = ` : <span class="type">${esc(t)} Time</span>`;
  } else $("lblFormal").innerHTML = "";
}

/* ---- 10 SEC cooldown (shows in side panel) ---- */
function startTen(){
  vote.active=false; vote.ended=false; $("voteBtn").textContent="Vote";
  formal.running=false; formalCtl(); updateLabel();   // 10s ends the formal
  ten.done=false; ten.endAt=now()+10*1000; ten.running=true;
}

/* ---- VOTE window (bar in side panel) ---- */
function toggleVote(){
  if(vote.active){ vote.active=false; vote.ended=false; $("voteFill").style.width="0"; $("voteBtn").textContent="Vote"; return; }
  ten.running=false; ten.done=false;
  formal.running=false; formalCtl(); updateLabel();   // vote ends the formal
  vote.active=true; vote.ended=false; vote.startAt=now(); $("voteBtn").textContent="Reset";
}

/* ---- PAUSE (day stays visible) ---- */
function togglePause(){
  const any = day.running||formal.running||ten.running||vote.active;
  if(!any) return;
  paused=!paused; document.body.classList.toggle("paused",paused);
  const cd=[day,ten]; // countdowns use endAt/remain; formal+vote count up (startAt)
  if(paused){
    cd.forEach(t=>{ if(t.running) t.remain=t.endAt-now(); });
    if(formal.running) formal.pausedElapsed=now()-formal.startAt;
    if(vote.active) vote.pausedElapsed=now()-vote.startAt;
  } else {
    cd.forEach(t=>{ if(t.running) t.endAt=now()+(t.remain||0); });
    if(formal.running) formal.startAt=now()-formal.pausedElapsed;
    if(vote.active) vote.startAt=now()-vote.pausedElapsed;
  }
  $("pauseBtn").textContent=paused?"Resume":"Pause"; setActionsEnabled();
}

/* ---- render ---- */
function tick(){
  const t=now();
  // DAY (always visible)
  if(day.running){
    const rem = paused?day.remain/1000:(day.endAt-t)/1000;
    const c=$("dayClk");
    c.className="clk mono"+(rem<0?" negative":(rem<=cfg.dayDanger?" danger":(rem<=cfg.dayWarn?" warn":"")));
    c.textContent=fmt(rem);
  }
  // SIDE panel mode: vote > ten > formal
  const side=$("side"), lab=$("sideLab"), clk=$("sideClk");
  $("voteMini").style.display="none";
  if(vote.active){
    side.className="panel side mode-vote"; lab.textContent = vote.ended?"TIME":"VOTE";
    const el = (paused?vote.pausedElapsed:(t-vote.startAt))/1000;
    const over = el>=cfg.vote;
    $("voteFill").style.width = Math.min(100, el/cfg.vote*100)+"%";
    $("voteFill").style.background = over ? "var(--danger)" : "var(--accent)"; // blue -> red at the window
    $("voteCount").textContent = Math.min(el,cfg.vote).toFixed(3);            // main freezes at 3.000
    if(over){ $("voteMini").style.display="block"; $("voteMini").textContent=Math.min(el,5).toFixed(3); } // 3->5s, faint
    if(over && !vote.ended) vote.ended=true;
  } else if(ten.running || ten.done){
    side.className="panel side mode-ten"; lab.textContent="10 SEC";
    if(ten.running){
      const rem = paused?ten.remain/1000:(ten.endAt-t)/1000;
      if(rem<=0 && !paused){ ten.running=false; ten.done=true; } // hold on 0
      clk.className="clk mono"+(rem<=3?" danger":" warn");
      clk.textContent=Math.max(0,Math.ceil(rem));
    } else {
      clk.className="clk mono danger"; clk.textContent="0"; // held
    }
  } else {
    side.className="panel side mode-formal"; lab.textContent="FORMAL";
    $("side").classList.toggle("on",formal.running);
    if(formal.running){
      const el = paused?formal.pausedElapsed/1000:(t-formal.startAt)/1000;
      const remaining = formal.total - el;   // colour tracks time LEFT vs the limit
      clk.className="clk mono"+(remaining<=cfg.danger?" danger":(remaining<=cfg.warn?" warn":""));
      clk.textContent = cfg.formalDir==="down" ? fmt(remaining) : fmt(el);
    } else {
      clk.className="clk mono"; clk.textContent="00:00"; // idle / after 10s or vote reset
    }
  }
  $("dayPanel").classList.toggle("on",day.running && !formal.running);
  requestAnimationFrame(tick);
}

/* ---- settings ---- */
function openSettings(){
  $("setDay").value=cfg.dayMin; $("setVote").value=cfg.vote;
  $("setWarn").value=cfg.warn; $("setDanger").value=cfg.danger; $("setDir").value=cfg.formalDir;
  $("setFont").value=cfg.font; $("setDayWarn").value=cfg.dayWarn; $("setDayDanger").value=cfg.dayDanger; $("setSize").value=cfg.size; $("setF3min").value=cfg.f3min?"on":"off"; $("setGtd").value=cfg.gtdMin;
  $("settings").classList.add("show");
}
function saveSettings(){
  cfg.dayMin=+$("setDay").value||18;
  cfg.vote=+$("setVote").value||3; cfg.warn=+$("setWarn").value||60; cfg.danger=+$("setDanger").value||20;
  cfg.formalDir=$("setDir").value; cfg.font=$("setFont").value;
  cfg.dayWarn=+$("setDayWarn").value||120; cfg.dayDanger=+$("setDayDanger").value||30; cfg.size=$("setSize").value; cfg.f3min=$("setF3min").value==="on"; cfg.gtdMin=+$("setGtd").value||2;
  saveCfg(); applyFont(); applyScale(); $("dayMin").value=cfg.dayMin;
  if(!day.running) $("dayClk").textContent="00:00";
  updateLabel();
  $("settings").classList.remove("show");
}

/* wire */
$("dayToggle").onclick=toggleDay; $("fToggle").onclick=toggleFormal;
$("fType").onchange=updateLabel;
$("fName").oninput=updateLabel;
$("fLen").onchange=()=>{ cfg.formal=$("fLen").value; saveCfg(); if(formal.running) formal.total=parseDur(cfg.formal); updateLabel(); };
$("dayNum").oninput=updateLabel;
$("f3toggle").onchange=()=>{
  if(cfg.f3min){
    cfg.formal=$("f3toggle").checked?"3:00":"4:00"; $("fLen").value=cfg.formal; saveCfg();
    if(formal.running) formal.total=parseDur(cfg.formal);
  }
  updateLabel();
};
$("pauseBtn").onclick=togglePause; $("tenBtn").onclick=startTen; $("voteBtn").onclick=toggleVote;
$("gear").onclick=openSettings; $("setSave").onclick=saveSettings;
$("setCancel").onclick=()=>$("settings").classList.remove("show");
$("gtdBtn").onclick=startGTD;
document.querySelectorAll('#settings .tab').forEach(tb=>tb.onclick=()=>{
  document.querySelectorAll('#settings .tab').forEach(x=>x.classList.toggle('active',x===tb));
  document.querySelectorAll('#settings .tabpane').forEach(p=>p.hidden=p.id!=='tab-'+tb.dataset.tab);
});
document.addEventListener("keydown",e=>{
  if(e.target.tagName==="INPUT"||e.target.tagName==="SELECT") return;
  if(e.code==="Space"){ e.preventDefault(); togglePause(); }
});

$("dayMin").value=cfg.dayMin; $("dayClk").textContent="00:00"; applyFont();
$("fLen").value=cfg.formal; updateLabel();
applyScale(); dayCtl(); formalCtl(); setActionsEnabled(); tick();
</script>
</body>
</html>
